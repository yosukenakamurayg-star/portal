<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="マイポータル">
<title>マイポータル</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#f0efee;--text:#1a1a18;--text2:#6b6b67;--text3:#9c9a92;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--purple:#534AB7;--blue:#185FA5;--teal:#0F6E56;--amber:#854F0B;--green:#1D9E75;--red:#A32D2D;--tabbar:56px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2a2a28;--text:#e8e6de;--text2:#9c9a92;--text3:#6b6b67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:var(--tabbar);}
.app{max-width:900px;margin:0 auto;padding:12px 12px 0;}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px;gap:8px;flex-wrap:wrap;}
.htitle{font-size:16px;font-weight:600;}.hsub{font-size:11px;color:var(--text3);margin-top:1px;}
.hbtns{display:flex;gap:6px;align-items:center;}
.syncinfo{font-size:11px;color:var(--text3);}
.btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sdot.spin{background:#EF9F27;animation:pulse .7s ease-in-out infinite;}
.sdot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* タブバー */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tabbar);background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:100;}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;padding:4px 0;border:none;background:none;}
.tbtn.on{color:var(--purple);}
.tbtn.on.t1{color:var(--blue);}
.tbtn.on.t2{color:var(--teal);}
.tbtn.on.t3{color:var(--amber);}
.tbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.pane{display:none;}.pane.on{display:block;}
/* メトリクス */
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.metric{background:var(--bg);border-radius:12px;padding:12px;border:1px solid var(--border);}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:2px;}
.mval{font-size:24px;font-weight:600;color:var(--text);line-height:1.1;}
.msub{font-size:11px;color:var(--text3);}
.two{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;}
@media(max-width:600px){.two{grid-template-columns:1fr;}.metrics{grid-template-columns:repeat(3,1fr);}}
.card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stitle{font-size:13px;font-weight:600;}
.nlink{font-size:11px;color:var(--blue);text-decoration:none;padding:3px 8px;border-radius:8px;border:1px solid rgba(24,95,165,0.3);}
.row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:all .15s;}
.chk.done{background:var(--green);border-color:var(--green);}
.chk.done::after{content:'';display:block;width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.chk.loading{opacity:.4;pointer-events:none;}
.itxt{font-size:13px;color:var(--text);line-height:1.45;flex:1;min-width:0;}
.itxt.done{text-decoration:line-through;color:var(--text3);}
.isub{font-size:11px;color:var(--text3);}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.bpurple{background:#EEEDFE;color:#3C3489;}.bblue{background:#E6F1FB;color:#0C447C;}
.bteal{background:#E1F5EE;color:#085041;}.bamber{background:#FAEEDA;color:#633806;}
.bred{background:#FCEBEB;color:#791F1F;}.bgray{background:#F1EFE8;color:#444441;}
.bgreen{background:#EAF3DE;color:#27500A;}.borange{background:#FEF3E8;color:#7A3A00;}
.bpink{background:#FEE8F3;color:#7A0044;}
@media(prefers-color-scheme:dark){
  .bpurple{background:#2a2460;color:#AFA9EC;}.bblue{background:#0a2a4a;color:#85B7EB;}
  .bteal{background:#0a2e24;color:#5DCAA5;}.bamber{background:#3a2a0a;color:#EF9F27;}
  .bred{background:#3a1010;color:#F09595;}.bgray{background:#2a2a28;color:#B4B2A9;}
  .bgreen{background:#0a2a1a;color:#97C459;}.borange{background:#3a1e00;color:#F5A623;}
  .bpink{background:#3a0022;color:#F07ACC;}
}
.dchip{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.dchip.urg{color:var(--red);font-weight:600;}
.irow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.irow input,.irow select{padding:8px 10px;border:1px solid var(--border2);border-radius:10px;background:var(--bg);color:var(--text);font-size:13px;outline:none;}
.irow input:focus,.irow select:focus{border-color:var(--blue);}
.irow input{flex:1;min-width:100px;}
.irow button{padding:8px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;}
.irow button:disabled{opacity:.5;cursor:not-allowed;}
/* 情報収集メモ用 */
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.ftag{padding:4px 11px;font-size:12px;border-radius:14px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;}
.ftag.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.info-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;}
.info-body{flex:1;min-width:0;}
.info-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.info-desc{font-size:11px;color:var(--text2);line-height:1.5;}
.info-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
.info-date{font-size:10px;color:var(--text3);}
.del{font-size:16px;cursor:pointer;color:var(--text3);flex-shrink:0;padding:0 2px;}
.del:hover{color:var(--red);}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:13px;}
.toast{position:fixed;bottom:calc(var(--tabbar)+10px);left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><div class="htitle">マイポータル</div><div class="hsub" id="today-label"></div></div>
    <div class="hbtns">
      <span class="syncinfo" id="sync-time"></span>
      <button class="btn" id="sync-btn" onclick="syncAll()">
        <span class="sdot" id="sdot"></span><span id="slbl">Notionと同期</span>

  <!-- Tab0: Broadcom準備 -->

    <div class="metrics" id="m0"></div>
    <div class="two">
      <div>
        <div class="shdr"><span class="stitle">書類提出ステータス</span><a class="nlink" href="https://www.notion.so/325112bb45a38161839fc593c658407d" target="_blank">Notionで開く</a></div>
        <div class="card" id="doc-list"></div>

  <!-- Tab1: TODO -->

        <div class="card" id="task-k"></div>
        <div class="irow">
          <input id="ni-k" type="text" placeholder="個人タスクを追加…" onkeydown="if(event.key==='Enter')addTask('個人')">
          <select id="pri-k"><option>高</option><option selected>中</option><option>低</option></select>

      <div class="shdr"><span class="stitle">転職関連のTODO</span><a class="nlink" href="https://www.notion.so/dc754a0d0b70477582f4e7b2fc8e3f73" target="_blank">Notionで管理</a></div>
      <div class="card" id="task-t"></div>

  <!-- Tab2: 情報収集メモ -->
  <div class="pane" id="pane2">

    </div>
    <div class="filter-row" id="info-filters"></div>
    <div id="info-list"></div>
    <div class="card" style="margin-top:10px;">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;">新しい情報を追加</div>
      <div class="irow">
        <input id="info-title" type="text" placeholder="タイトル・件名" style="flex:2;" onkeydown="if(event.key==='Enter')addInfo()">
        <select id="info-cat">
          <option>競合情報</option><option>入札情報</option><option>製品知識</option>
          <option>VM製品</option><option>業界動向</option><option>英語業務</option><option>Office操作</option>

  <!-- Tab3: スケジュール -->
  <div class="pane" id="pane3">

        <div class="card" id="sch-list"></div>

          <input id="sch-t" type="text" placeholder="予定タイトル…" onkeydown="if(event.key==='Enter')addSch()">
          <input id="sch-d" type="date" style="width:130px;flex-shrink:0;">
          <select id="sch-c" style="flex-shrink:0;"><option>仕事</option><option>転職</option><option>個人</option></select>

</div>

<!-- タブバー -->
<div class="tabbar">
  <button class="tbtn t0 on" onclick="sw(0)" id="tb0">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

  <button class="tbtn t2" onclick="sw(2)" id="tb2">
    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
    <span>情報収集</span>
  </button>
  <button class="tbtn t3" onclick="sw(3)" id="tb3">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>スケジュール</span>
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
const TOKEN  = 'ntn_V46092302432x0V2m9PzBKX1AekFAq3EFxDFvKgG9Sz1zZ';
const PROXY  = 'https://notion-proxy.yosuke-nakamura-yg.workers.dev';
const TASK_DB= 'dc754a0d-0b70-4775-82f4-e7b2fc8e3f73';
const SCH_DB = '5abb5d37-3eb3-4b23-895d-7879a57618d4';
const INFO_DB= 'ab97942d-5b0d-4025-9bac-031230b1448a';

const FIXED={
  docs:[
    {name:'履歴書',status:'送付済み',ok:true},{name:'源泉徴収票',status:'送付済み',ok:true},
    {name:'卒業証明書（日本語）',status:'送付済み',ok:true},{name:'卒業証明書（英文）',status:'送付済み',ok:true},
    {name:'オファーレター',status:'3月末受取予定',ok:false},{name:'退職届',status:'準備中',ok:false},
    {name:'身元保証書',status:'未着手',ok:false},
  ],
  milestones:[
    {title:'退職申告 期限確認',date:'2026-03-25',urgent:true},
    {title:'オファーレター 受取・署名',date:'2026-03-31',urgent:true},
    {title:'退職届 提出',date:'2026-04-10',urgent:false},
    {title:'退職日',date:'2026-05-30',urgent:false},
    {title:'VMware 入社日',date:'2026-06-01',urgent:false},
  ],
  deadlines:[
    {title:'オファーレター 署名・返送',date:'2026-03-31',urgent:true},
    {title:'退職届 提出',date:'2026-04-10',urgent:false},
    {title:'退職日',date:'2026-05-30',urgent:false},
    {title:'入社日',date:'2026-06-01',urgent:false},
    {title:'DC年金 移換手続き',date:'2026-11-30',urgent:false},
  ]
};

let nTasks={s:[],k:[],t:[]};
let nScheds=[];
let nInfos=[];

const TODAY=new Date();TODAY.setHours(0,0,0,0);
function daysUntil(d){const t=new Date(d);t.setHours(0,0,0,0);return Math.ceil((t-TODAY)/86400000);}
function dlabel(d){const n=daysUntil(d);if(n<0)return '期限超過';if(n===0)return '今日';if(n===1)return '明日';const dt=new Date(d);return(dt.getMonth()+1)+'/'+(dt.getDate());}

const catColor={
  仕事:'bblue',転職:'bpurple',個人:'bteal',
  競合情報:'bred',入札情報:'bblue',製品知識:'bteal',
  VM製品:'bpurple',業界動向:'borange',英語業務:'bpink',Office操作:'bgray'
};
const priColor={高:'bred',中:'bamber',低:'bgray'};

let toastTimer=null;
function toast(msg,dur=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

async function nFetch(path,method='GET',body=null){
  const res=await fetch(PROXY+'/notion'+path,{
    method,
    headers:{'Authorization':'Bearer '+TOKEN,'Notion-Version':'2022-06-28','Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const t=await res.text();throw new Error(res.status+': '+t);}
  return res.json();
}

async function syncAll(){
  const dot=document.getElementById('sdot');
  const lbl=document.getElementById('slbl');
  const btn=document.getElementById('sync-btn');
  dot.className='sdot spin';lbl.textContent='同期中…';btn.disabled=true;
  try{
    // タスクDB
    const tr=await nFetch('/v1/databases/'+TASK_DB+'/query','POST',{page_size:100});
    const s=[],k=[],t=[];
    (tr.results||[]).forEach(p=>{
      const pr=p.properties;
      const name=(pr['Name']?.title||[]).map(x=>x.plain_text).join('');
      if(!name)return;
      const cat=pr['カテゴリ']?.select?.name||'仕事';
      const pri=pr['優先度']?.select?.name||'中';
      const done=pr['ステータス']?.select?.name==='完了 🙌';
      const item={text:name,done,pri,id:p.id};
      if(cat==='個人')k.push(item);
      else if(cat==='転職')t.push(item);
      else s.push(item);
    });
    nTasks={s,k,t};

    // スケジュールDB
    const sr=await nFetch('/v1/databases/'+SCH_DB+'/query','POST',{page_size:50});
    nScheds=(sr.results||[]).map(p=>{
      const pr=p.properties;
      const title=(pr['タイトル']?.title||[]).map(x=>x.plain_text).join('');
      const date=pr['日付']?.date?.start||'';
      const cat=pr['カテゴリ']?.select?.name||'仕事';
      return title&&date?{title,date,cat,id:p.id}:null;
    }).filter(Boolean).sort((a,b)=>new Date(a.date)-new Date(b.date));

    // 情報収集メモDB
    const ir=await nFetch('/v1/databases/'+INFO_DB+'/query','POST',{
      page_size:50,
      sorts:[{property:'収集日',direction:'descending'},{timestamp:'created_time',direction:'descending'}]
    });
    nInfos=(ir.results||[]).map(p=>{
      const pr=p.properties;
      const title=(pr['用語']?.title||[]).map(x=>x.plain_text).join('');
      if(!title)return null;
      const desc=(pr['説明']?.rich_text||[]).map(x=>x.plain_text).join('');
      const cat=pr['情報種別']?.select?.name||'製品知識';
      const pri=pr['重要度']?.select?.name||'中';
      const sent=pr['発信済み']?.checkbox||false;
      const date=pr['収集日']?.date?.start||'';
      return {title,desc,cat,pri,sent,date,id:p.id};
    }).filter(Boolean);

    dot.className='sdot';lbl.textContent='Notionと同期';
    const now=new Date();
    document.getElementById('sync-time').textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 同期済み`;
    toast('Notionと同期しました');
  }catch(e){
    dot.className='sdot err';lbl.textContent='同期失敗';
    toast('同期失敗: '+e.message,4000);
  }
  btn.disabled=false;
  renderAll();
}

async function addTask(cat){
  const keyMap={仕事:'s',個人:'k',転職:'t'};
  const key=keyMap[cat];
  const inp=document.getElementById('ni-'+key);
  const val=inp.value.trim();
  if(!val)return;
  const pri=document.getElementById('pri-'+key).value;
  const btn=document.getElementById('btn-'+key);
  btn.disabled=true;btn.textContent='追加中…';
  try{
    const res=await nFetch('/v1/pages','POST',{
      parent:{database_id:TASK_DB},
      properties:{
        'Name':{title:[{text:{content:val}}]},
        'カテゴリ':{select:{name:cat}},
        '優先度':{select:{name:pri}},
        'ステータス':{select:{name:'未着手'}}
      }
    });
    nTasks[key].unshift({text:val,done:false,pri,id:res.id});
    inp.value='';toast('Notionにタスクを追加しました');renderTasks();
  }catch(e){toast('追加失敗: '+e.message,4000);}
  btn.disabled=false;btn.textContent='追加';
}

async function toggleTask(key,idx){
  const task=nTasks[key][idx];
  const newDone=!task.done;
  const chk=document.querySelector(`.chk[data-key="${key}"][data-idx="${idx}"]`);
  if(chk)chk.classList.add('loading');
  try{
    await nFetch('/v1/pages/'+task.id,'PATCH',{
      properties:{'ステータス':{select:{name:newDone?'完了 🙌':'未着手'}}}
    });
    nTasks[key][idx].done=newDone;
    toast(newDone?'完了にしました':'未着手に戻しました');renderTasks();
  }catch(e){
    toast('更新失敗',4000);
    if(chk)chk.classList.remove('loading');
  }
}

async function addInfo(){
  const title=document.getElementById('info-title').value.trim();
  const desc=document.getElementById('info-desc').value.trim();
  const cat=document.getElementById('info-cat').value;
  const pri=document.getElementById('info-pri').value;
  if(!title)return;
  const btn=document.getElementById('btn-info');
  btn.disabled=true;btn.textContent='追加中…';
  const today=new Date().toISOString().split('T')[0];
  try{
    const res=await nFetch('/v1/pages','POST',{
      parent:{database_id:INFO_DB},
      properties:{
        '用語':{title:[{text:{content:title}}]},
        '説明':{rich_text:[{text:{content:desc}}]},
        '情報種別':{select:{name:cat}},
        '重要度':{select:{name:pri}},
        '発信済み':{checkbox:false},
        '収集日':{date:{start:today}}
      }
    });
    nInfos.unshift({title,desc,cat,pri,sent:false,date:today,id:res.id});
    document.getElementById('info-title').value='';
    document.getElementById('info-desc').value='';
    toast('Notionに情報を追加しました');renderInfos();
  }catch(e){toast('追加失敗: '+e.message,4000);}
  btn.disabled=false;btn.textContent='追加';
}

async function toggleSent(idx){
  const info=nInfos[idx];
  const newSent=!info.sent;
  try{
    await nFetch('/v1/pages/'+info.id,'PATCH',{
      properties:{'発信済み':{checkbox:newSent}}
    });
    nInfos[idx].sent=newSent;
    toast(newSent?'発信済みにしました':'未発信に戻しました');renderInfos();
  }catch(e){toast('更新失敗',4000);}
}

async function addSch(){
  const t=document.getElementById('sch-t').value.trim();
  const d=document.getElementById('sch-d').value;
  const c=document.getElementById('sch-c').value;
  if(!t||!d){toast('タイトルと日付を入力してください');return;}
  const btn=document.getElementById('btn-sch');
  btn.disabled=true;btn.textContent='追加中…';
  try{
    const res=await nFetch('/v1/pages','POST',{
      parent:{database_id:SCH_DB},
      properties:{
        'タイトル':{title:[{text:{content:t}}]},
        '日付':{date:{start:d}},
        'カテゴリ':{select:{name:c}},
        'ステータス':{select:{name:'予定'}}
      }
    });
    nScheds.push({title:t,date:d,cat:c,id:res.id});
    nScheds.sort((a,b)=>new Date(a.date)-new Date(b.date));
    document.getElementById('sch-t').value='';
    toast('Notionにスケジュールを追加しました');renderSch();
  }catch(e){toast('追加失敗: '+e.message,4000);}
  btn.disabled=false;btn.textContent='追加';
}

function sw(i){
  document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('on',i===j));
  document.querySelectorAll('.tbtn').forEach((b,j)=>b.classList.toggle('on',i===j));
}

function renderMetrics(){
  const dIn=Math.max(0,daysUntil('2026-06-01'));
  const dQ=Math.max(0,daysUntil('2026-05-30'));
  const docOk=FIXED.docs.filter(d=>d.ok).length;
  document.getElementById('m0').innerHTML=`
    <div class="metric"><div class="mlabel">入社まで</div><div class="mval">${dIn}</div><div class="msub">日</div></div>
    <div class="metric"><div class="mlabel">退職まで</div><div class="mval">${dQ}</div><div class="msub">日</div></div>
    <div class="metric"><div class="mlabel">書類提出</div><div class="mval">${docOk}</div><div class="msub">/ ${FIXED.docs.length}件</div></div>`;
}
function renderDocs(){
  document.getElementById('doc-list').innerHTML=FIXED.docs.map(d=>`
    <div class="row"><span class="itxt">${d.name}</span><span class="badge ${d.ok?'bgreen':'bamber'}">${d.status}</span></div>`).join('');
}
function renderMilestones(){
  document.getElementById('mile-list').innerHTML=[...FIXED.milestones].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(m=>`
    <div class="row"><span class="itxt">${m.title}</span><span class="dchip ${m.urgent?'urg':''}">${dlabel(m.date)}</span></div>`).join('');
}

function renderTasks(){
  ['s','k','t'].forEach(key=>{
    const arr=nTasks[key];
    const id='task-'+key;
    document.getElementById(id).innerHTML=arr.length
      ?arr.map((x,i)=>`
        <div class="row">
          <div class="chk ${x.done?'done':''}" data-key="${key}" data-idx="${i}" onclick="toggleTask('${key}',${i})"></div>
          <div style="flex:1;min-width:0;"><div class="itxt ${x.done?'done':''}">${x.text}</div></div>
          <span class="badge ${priColor[x.pri]||'bgray'}">${x.pri}</span>
        </div>`).join('')
      :'<div class="empty">Notionと同期してください</div>';
  });
}

let infoFilter='all';
function renderInfoFilters(){
  const cats=['all','競合情報','入札情報','製品知識','VM製品','業界動向','英語業務','Office操作'];
  document.getElementById('info-filters').innerHTML=cats.map(c=>`
    <button class="ftag ${infoFilter===c?'on':''}" onclick="infoFilter='${c}';renderInfoFilters();renderInfos();">${c==='all'?'すべて':c}</button>`).join('');
}
function renderInfos(){
  const list=infoFilter==='all'?nInfos:nInfos.filter(x=>x.cat===infoFilter);
  if(!list.length){document.getElementById('info-list').innerHTML='<div class="empty">Notionと同期してください</div>';return;}
  document.getElementById('info-list').innerHTML=list.map((x,i)=>`
    <div class="info-card">
      <div class="info-body">
        <div class="info-title">${x.title}</div>
        ${x.desc?`<div class="info-desc">${x.desc}</div>`:''}
        <div class="info-meta">
          <span class="badge ${catColor[x.cat]||'bgray'}">${x.cat}</span>
          <span class="badge ${priColor[x.pri]||'bgray'}">${x.pri}</span>
          ${x.date?`<span class="info-date">${x.date.slice(5).replace('-','/')}</span>`:''}
          <button style="font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border2);background:${x.sent?'var(--green)':'var(--bg2)'};color:${x.sent?'#fff':'var(--text2)'};cursor:pointer;" onclick="toggleSent(${nInfos.indexOf(x)})">${x.sent?'✓ 発信済み':'未発信'}</button>
        </div>
      </div>
    </div>`).join('');
}

function renderSch(){
  document.getElementById('sch-list').innerHTML=nScheds.length
    ?nScheds.map(x=>`
      <div class="row">
        <div class="itxt">${x.title}</div>
        <span class="badge ${catColor[x.cat]||'bgray'}">${x.cat}</span>
        <span class="dchip">${dlabel(x.date)}</span>
      </div>`).join('')
    :'<div class="empty">Notionと同期してください</div>';
  document.getElementById('dead-list').innerHTML=[...FIXED.deadlines].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(d=>`
    <div class="row"><div class="itxt">${d.title}</div><span class="dchip ${d.urgent?'urg':''}">${dlabel(d.date)}</span></div>`).join('');
}

function renderAll(){
  renderMetrics();renderDocs();renderMilestones();
  renderTasks();
  renderInfoFilters();renderInfos();
  renderSch();
}

function init(){
  const d=new Date();
  document.getElementById('today-label').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
  document.getElementById('sch-d').valueAsDate=new Date();
  renderAll();
  syncAll();
}
init();
</script>
</body>
</html>
