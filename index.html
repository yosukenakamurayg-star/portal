<title>マイポータル</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#f0efee;--text:#1a1a18;--text2:#6b6b67;--text3:#9c9a92;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--purple:#534AB7;--blue:#185FA5;--teal:#0F6E56;--amber:#854F0B;--green:#1D9E75;--red:#A32D2D;--tabbar:56px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2a2a28;--text:#e8e6de;--text2:#9c9a92;--text3:#6b6b67;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:var(--tabbar);}
.app{max-width:900px;margin:0 auto;padding:12px 12px 0;}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px;gap:8px;flex-wrap:wrap;}
.htitle{font-size:16px;font-weight:600;}.hsub{font-size:11px;color:var(--text3);margin-top:1px;}
.hbtns{display:flex;gap:6px;align-items:center;}
.syncinfo{font-size:11px;color:var(--text3);}
.btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sdot.spin{background:#EF9F27;animation:pulse .7s ease-in-out infinite;}
.sdot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ─ 下部タブバー ─ */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tabbar);background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:100;}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;padding:4px 0;border:none;background:none;transition:color .15s;}
.tbtn.on{color:var(--purple);}
.tbtn.on.t1{color:var(--blue);}
.tbtn.on.t2{color:var(--teal);}
.tbtn.on.t3{color:var(--amber);}
.tbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.pane{display:none;}.pane.on{display:block;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px;}
.metric{background:var(--bg);border-radius:12px;padding:12px;border:1px solid var(--border);}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:2px;}
.mval{font-size:22px;font-weight:600;color:var(--text);line-height:1.1;}
.msub{font-size:11px;color:var(--text3);}
.two{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;}
@media(max-width:600px){.two{grid-template-columns:1fr;}.metrics{grid-template-columns:repeat(2,1fr);}}
.card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stitle{font-size:13px;font-weight:600;}
.nlink{font-size:11px;color:var(--blue);text-decoration:none;padding:3px 8px;border-radius:8px;border:1px solid rgba(24,95,165,0.3);}
.row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:all .15s;}
.chk.done{background:var(--green);border-color:var(--green);}
.chk.done::after{content:'';display:block;width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.chk.loading{opacity:.4;pointer-events:none;}
.itxt{font-size:13px;color:var(--text);line-height:1.45;flex:1;min-width:0;}
.itxt.done{text-decoration:line-through;color:var(--text3);}
.isub{font-size:11px;color:var(--text3);}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.bpurple{background:#EEEDFE;color:#3C3489;}.bblue{background:#E6F1FB;color:#0C447C;}
.bteal{background:#E1F5EE;color:#085041;}.bamber{background:#FAEEDA;color:#633806;}
.bred{background:#FCEBEB;color:#791F1F;}.bgray{background:#F1EFE8;color:#444441;}
.bgreen{background:#EAF3DE;color:#27500A;}
@media(prefers-color-scheme:dark){
  .bpurple{background:#2a2460;color:#AFA9EC;}.bblue{background:#0a2a4a;color:#85B7EB;}
  .bteal{background:#0a2e24;color:#5DCAA5;}.bamber{background:#3a2a0a;color:#EF9F27;}
  .bred{background:#3a1010;color:#F09595;}.bgray{background:#2a2a28;color:#B4B2A9;}
  .bgreen{background:#0a2a1a;color:#97C459;}
}
.dchip{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.dchip.urg{color:var(--red);font-weight:600;}
.irow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.irow input,.irow select{padding:8px 10px;border:1px solid var(--border2);border-radius:10px;background:var(--bg);color:var(--text);font-size:13px;outline:none;}
.irow input:focus,.irow select:focus{border-color:var(--blue);}
.irow input{flex:1;min-width:100px;}
.irow button{padding:8px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;}
.irow button:disabled{opacity:.5;cursor:not-allowed;}
.filter-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.ftab{padding:4px 11px;font-size:12px;border-radius:14px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;}
.ftab.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.mcats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.mcat{padding:5px 12px;font-size:12px;border-radius:16px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;}
.mcat.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.empty{text-align:center;padding:20px;color:var(--text3);font-size:13px;}
.toast{position:fixed;bottom:calc(var(--tabbar) + 10px);left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>

async function nFetch(path,method='GET',body=null){
  const res=await fetch(PROXY+'/notion'+path,{
    method,
    headers:{'Authorization':'Bearer '+TOKEN,'Notion-Version':'2022-06-28','Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const t=await res.text();throw new Error(res.status+': '+t);}
  return res.json();
}

  try{
    const tr=await nFetch('/v1/databases/'+TASK_DB+'/query','POST',{page_size:100});
    const s=[],k=[],t=[];
    (tr.results||[]).forEach(p=>{
      const pr=p.properties;
      const name=(pr['Name']?.title||[]).map(x=>x.plain_text).join('');
      if(!name)return;
      const cat=pr['カテゴリ']?.select?.name||'仕事';
      const pri=pr['優先度']?.select?.name||'中';
      const done=pr['ステータス']?.select?.name==='完了 🙌';
      const item={text:name,done,pri,id:p.id};
      if(cat==='個人')k.push(item);
      else if(cat==='転職')t.push(item);
      else s.push(item);
    });
    nTasks={s,k,t};

    const sr=await nFetch('/v1/databases/'+SCH_DB+'/query','POST',{page_size:50});
    nScheds=(sr.results||[]).map(p=>{
      const pr=p.properties;
      const title=(pr['タイトル']?.title||[]).map(x=>x.plain_text).join('');
      const date=pr['日付']?.date?.start||'';
      const cat=pr['カテゴリ']?.select?.name||'仕事';
      return title&&date?{title,date,cat,id:p.id}:null;
    }).filter(Boolean).sort((a,b)=>new Date(a.date)-new Date(b.date));

    dot.className='sdot';lbl.textContent='Notionと同期';
    const now=new Date();
    document.getElementById('sync-time').textContent=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 同期済み`;
    toast('Notionと同期しました');
  }catch(e){
    dot.className='sdot err';lbl.textContent='同期失敗';
    toast('同期失敗: '+e.message,4000);
  }
  btn.disabled=false;
  renderAll();
}

async function addTask(cat){
  const keyMap={仕事:'s',個人:'k',転職:'t'};
  const key=keyMap[cat];
  const inp=document.getElementById('ni-'+key);
  const val=inp.value.trim();
  if(!val)return;
  const pri=document.getElementById('pri-'+key).value;
  const btn=document.getElementById('btn-'+key);
  btn.disabled=true;btn.textContent='追加中…';
  try{
    const res=await nFetch('/v1/pages','POST',{
      parent:{database_id:TASK_DB},
      properties:{
        'Name':{title:[{text:{content:val}}]},
        'カテゴリ':{select:{name:cat}},
        '優先度':{select:{name:pri}},
        'ステータス':{select:{name:'未着手'}}
      }
    });
    nTasks[key].unshift({text:val,done:false,pri,id:res.id});
    inp.value='';
    toast('Notionにタスクを追加しました');
    renderTasks();
  }catch(e){toast('追加失敗: '+e.message,4000);}
  btn.disabled=false;btn.textContent='追加';
}

async function toggleTask(key,idx){
  const task=nTasks[key][idx];
  const newDone=!task.done;
  const chk=document.querySelector(`.chk[data-key="${key}"][data-idx="${idx}"]`);
  if(chk)chk.classList.add('loading');
  try{
    await nFetch('/v1/pages/'+task.id,'PATCH',{
      properties:{'ステータス':{select:{name:newDone?'完了 🙌':'未着手'}}}
    });
    nTasks[key][idx].done=newDone;
    toast(newDone?'完了にしました':'未着手に戻しました');
    renderTasks();
  }catch(e){
    toast('更新失敗: '+e.message,4000);
    if(chk)chk.classList.remove('loading');
  }
}

async function addSch(){
  const t=document.getElementById('sch-t').value.trim();
  const d=document.getElementById('sch-d').value;
  const c=document.getElementById('sch-c').value;
  if(!t||!d){toast('タイトルと日付を入力してください');return;}
  const btn=document.getElementById('btn-sch');
  btn.disabled=true;btn.textContent='追加中…';
  try{
    const res=await nFetch('/v1/pages','POST',{
      parent:{database_id:SCH_DB},
      properties:{
        'タイトル':{title:[{text:{content:t}}]},
        '日付':{date:{start:d}},
        'カテゴリ':{select:{name:c}},
        'ステータス':{select:{name:'予定'}}
      }
    });
    nScheds.push({title:t,date:d,cat:c,id:res.id});
    nScheds.sort((a,b)=>new Date(a.date)-new Date(b.date));
    document.getElementById('sch-t').value='';
    toast('Notionにスケジュールを追加しました');
    renderSch();
  }catch(e){toast('追加失敗: '+e.message,4000);}
  btn.disabled=false;btn.textContent='追加';
}

function sw(i){
  document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('on',i===j));
  document.querySelectorAll('.tbtn').forEach((b,j)=>b.classList.toggle('on',i===j));
}

function renderMetrics(){
  const wDone=FIXED.weekTodos.filter(x=>x.done).length;
  document.getElementById('m0').innerHTML=`
    <div class="metric"><div class="mlabel">入社まで</div><div class="mval">${Math.max(0,daysUntil('2026-06-01'))}</div><div class="msub">日</div></div>
    <div class="metric"><div class="mlabel">退職まで</div><div class="mval">${Math.max(0,daysUntil('2026-05-30'))}</div><div class="msub">日</div></div>
    <div class="metric"><div class="mlabel">書類提出</div><div class="mval">${FIXED.docs.filter(d=>d.ok).length}</div><div class="msub">/ ${FIXED.docs.length}件</div></div>
    <div class="metric"><div class="mlabel">今週TODO</div><div class="mval">${wDone}</div><div class="msub">/ ${FIXED.weekTodos.length}完了</div></div>`;
}
function renderWeek(){
  document.getElementById('week-list').innerHTML=FIXED.weekTodos.map(x=>`
    <div class="row"><div class="chk ${x.done?'done':''}"></div><span class="itxt ${x.done?'done':''}">${x.text}</span></div>`).join('');
}
function renderDocs(){
  document.getElementById('doc-list').innerHTML=FIXED.docs.map(d=>`
    <div class="row"><span class="itxt">${d.name}</span><span class="badge ${d.ok?'bgreen':'bamber'}">${d.status}</span></div>`).join('');
}
function renderMilestones(){
  document.getElementById('mile-list').innerHTML=[...FIXED.milestones].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(m=>`
    <div class="row"><span class="itxt">${m.title}</span><span class="dchip ${m.urgent?'urg':''}">${dlabel(m.date)}</span></div>`).join('');
}

function renderTasks(){
  const keyMap={s:'task-s',k:'task-k',t:'task-t'};
  Object.entries(keyMap).forEach(([key,id])=>{
    const arr=nTasks[key];
    document.getElementById(id).innerHTML=arr.length
      ?arr.map((x,i)=>`
        <div class="row">
          <div class="chk ${x.done?'done':''}" data-key="${key}" data-idx="${i}" onclick="toggleTask('${key}',${i})"></div>
          <div style="flex:1;min-width:0;"><div class="itxt ${x.done?'done':''}">${x.text}</div></div>
          <span class="badge ${priColor[x.pri]||'bgray'}">${x.pri}</span>
        </div>`).join('')
      :'<div class="empty">Notionと同期してください</div>';
  });
}

let memoFilter='all';
function renderMemoCats(){
  document.getElementById('mcats').innerHTML=['all','英語業務','VM製品','防衛省','Office'].map(c=>`
    <button class="mcat ${memoFilter===c?'on':''}" onclick="memoFilter='${c}';renderMemoCats();renderMemos();">${c==='all'?'すべて':c}</button>`).join('');
}
function renderMemos(){
  const list=memoFilter==='all'?LS.memos:LS.memos.filter(m=>m.cat===memoFilter);
  document.getElementById('memo-list').innerHTML=list.length
    ?list.map(m=>{const i=LS.memos.indexOf(m);return`
      <div class="card" style="padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:500;color:var(--text);">${m.en}</div>
          <div class="isub">${m.ja}</div>
        </div>
        <span class="badge ${catColor[m.cat]||'bgray'}">${m.cat}</span>
        <span style="font-size:16px;cursor:pointer;color:var(--text3);padding:0 2px;" onclick="LS.memos.splice(${i},1);saveLS();renderMemos();">×</span>
      </div>`;}).join('')
    :'<div class="empty">メモなし</div>';
}
function addMemo(){
  const en=document.getElementById('m-en').value.trim();
  const ja=document.getElementById('m-ja').value.trim();
  const cat=document.getElementById('m-cat').value;
  if(!en)return;
  LS.memos.unshift({en,ja,cat});
  document.getElementById('m-en').value='';
  document.getElementById('m-ja').value='';
  saveLS();renderMemos();toast('メモを追加しました');
}

function renderSch(){
  document.getElementById('sch-list').innerHTML=nScheds.length
    ?nScheds.map(x=>`
      <div class="row">
        <div class="itxt">${x.title}</div>
        <span class="badge ${catColor[x.cat]||'bgray'}">${x.cat}</span>
        <span class="dchip">${dlabel(x.date)}</span>
      </div>`).join('')
    :'<div class="empty">Notionと同期してください</div>';
  document.getElementById('dead-list').innerHTML=[...FIXED.deadlines].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(d=>`
    <div class="row"><div class="itxt">${d.title}</div><span class="dchip ${d.urgent?'urg':''}">${dlabel(d.date)}</span></div>`).join('');
}

function renderAll(){renderMetrics();renderWeek();renderDocs();renderMilestones();renderTasks();renderMemoCats();renderMemos();renderSch();}

function init(){
  const d=new Date();
  document.getElementById('today-label').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
  document.getElementById('sch-d').valueAsDate=new Date();
  renderAll();
  syncAll();
}
init();
</script>
</body>
</html>
