<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0b1326; color: #dae2fd; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; font-size: 22px; }
  .fill-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

/* Section switching */
.section { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.section.active { display: flex; }

/* Swipe */
.swipe-card { position: relative; overflow: hidden; border-radius: 0.25rem; margin-bottom: 6px; }
.swipe-inner { position: relative; z-index: 2; background: #171f33; transition: transform .3s cubic-bezier(.25,.46,.45,.94); display: flex; flex-direction: column; gap: 4px; padding: 10px 12px; }
.swipe-card.swiped-left .swipe-inner { transform: translateX(-80px); }
.swipe-card.swiped-right .swipe-inner { transform: translateX(80px); }
.swipe-action { position: absolute; top: 0; bottom: 0; width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; z-index: 1; font-size: 10px; font-weight: 700; }
.swipe-action-complete { right: 0; background: #10B981; }
.swipe-action-delete { left: 0; background: #93000a; }
.swipe-action span { font-size: 18px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal-sheet { width: 100%; background: #131b2e; border-radius: 20px 20px 0 0; padding: 8px 20px 40px; max-height: 80vh; overflow-y: auto; animation: slideUp .3s cubic-bezier(.25,.46,.45,.94); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: #414754; border-radius: 2px; margin: 10px auto 16px; }

/* FAB */
.fab { position: fixed; bottom: 80px; right: 20px; z-index: 99; width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, #1A73E8, #ADC7FF); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(26,115,232,.5); transition: transform .15s; }
.fab:active { transform: scale(.9); }

/* Loading */
.loader { text-align: center; padding: 32px; color: #8b909f; font-size: 13px; }
.spinner { width: 22px; height: 22px; border: 2px solid #2d3449; border-top-color: #1a73e8; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Week calendar */
.week-day { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.week-day-label { font-size: 9px; font-weight: 700; color: #8b909f; }
.week-day-num { width: 36px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #c1c6d6; border-radius: 8px; transition: all .15s; }
.week-day-num.today { background: linear-gradient(135deg, #1A73E8, #ADC7FF); color: #060e20; }
.week-day-num.selected { background: #222a3d; color: #adc7ff; }

/* Form */
.form-input { width: 100%; padding: 12px 14px; background: #222a3d; border: 1px solid #414754; border-radius: 8px; font-family: ‘Inter’, sans-serif; font-size: 14px; color: #dae2fd; outline: none; margin-bottom: 10px; }
.form-input:focus { border-color: #1a73e8; }
.form-select { flex: 1; padding: 10px 12px; background: #222a3d; border: 1px solid #414754; border-radius: 8px; font-family: ‘Inter’, sans-serif; font-size: 13px; color: #dae2fd; outline: none; appearance: none; }

/* Filter chips */
.filter-chip { padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; border: 1px solid #414754; background: #171f33; color: #8b909f; cursor: pointer; white-space: nowrap; transition: all .15s; }
.filter-chip.active { background: #1a73e8; border-color: #1a73e8; color: #fff; }

/* Bento cards */
.stat-card { background: #171f33; border-radius: 12px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; height: 76px; }
</style>

<script>
// ── CONFIG ──
const TOKEN = 'ntn_V46092302432x0V2m9PzBKX1AekFAq3EFxDFvKgG9Sz1zZ';
const PROXY = 'https://notion-proxy.yosuke-nakamura-yg.workers.dev';
const DB_TASKS = 'dc754a0d-0b70-4775-82f4-e7b2fc8e3f73';
const DB_SCHED = '5abb5d37-3eb3-4b23-895d-7879a57618d4';

// ── STATE ──
let allTasks = [], allSched = [], allKnow = [];
let filterCat = 'all', filterStatus = 'all';
let currentTaskId = null, currentTab = 'home';

// ── BOOT ──
document.addEventListener('DOMContentLoaded', () => {
  initGreeting();
  initWeekCalendar();
  loadTasks();
  loadSchedule();
  loadKnowledge();
});

function initGreeting() {
  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h < 10 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
  const d = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('header-date').textContent = `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
  document.getElementById('month-label').textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}

function initWeekCalendar() {
  const today = new Date();
  const dayOfWeek = today.getDay();
  const monday = new Date(today); monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7));
  const labels = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    html += `<div class="week-day" onclick="selectWeekDay(this)">
      <span class="week-day-label">${labels[i]}</span>
      <div class="week-day-num ${isToday ? 'today' : ''}" data-date="${d.toISOString().split('T')[0]}">${d.getDate()}</div>
    </div>`;
  }
  document.getElementById('week-row').innerHTML = html;
}

function selectWeekDay(el) {
  document.querySelectorAll('.week-day-num').forEach(n => { if (!n.classList.contains('today')) n.classList.remove('selected'); });
  const num = el.querySelector('.week-day-num');
  if (!num.classList.contains('today')) num.classList.add('selected');
}

// ── API ──
async function notionPost(path, body = {}) {
  try {
    const r = await fetch(`${PROXY}/v1${path}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch(e) { return {}; }
}
async function notionPatch(pageId, props) {
  try {
    await fetch(`${PROXY}/v1/pages/${pageId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ properties: props })
    });
  } catch(e) {}
}

// ── LOAD DATA ──
async function loadTasks() {
  const data = await notionPost(`/databases/${DB_TASKS}/query`, { page_size: 100 });
  allTasks = (data.results || []).map(p => ({
    id: p.id,
    title: p.properties['Name']?.title?.[0]?.text?.content || '（無題）',
    cat: p.properties['カテゴリ']?.select?.name || '',
    status: p.properties['ステータス']?.select?.name || '未着手',
    pri: p.properties['優先度']?.select?.name || '',
    due: p.properties['期限']?.date?.start || ''
  }));
  renderTasks();
  updateHome();
}

async function loadSchedule() {
  const data = await notionPost(`/databases/${DB_SCHED}/query`, { page_size: 100, sorts: [{ property: '日付', direction: 'ascending' }] });
  allSched = (data.results || []).map(p => ({
    id: p.id,
    title: p.properties['タイトル']?.title?.[0]?.text?.content || '（無題）',
    cat: p.properties['カテゴリ']?.select?.name || '',
    status: p.properties['ステータス']?.select?.name || '',
    date: p.properties['日付']?.date?.start || '',
    memo: p.properties['メモ']?.rich_text?.[0]?.text?.content || ''
  }));
  renderSchedule();
  updateHome();
}

function loadKnowledge() {
  allKnow = [
    { id: '1', title: '公共クラウド移行の課題整理', preview: 'レガシーシステム互換性、セキュリティ要件、調達プロセスの複雑さ...', tags: ['クラウド','公共'], date: '2026-03-24', type: 'INSIGHT' },

    { id: '3', title: '外資系ビジネス英語フレーズ集', preview: 'Let me circle back / I\'d like to piggyback on that point...', tags: ['英語','学習'], date: '2026-03-22', type: 'LEARNING' },
    { id: '4', title: '公共セクター入札対策フレームワーク', preview: '評価基準の分析手法、競合比較マトリクス、提案書の差別化戦略...', tags: ['営業','公共'], date: '2026-03-20', type: 'BUSINESS' },
  ];

// ── RENDER TASKS ──
function renderTasks() {
  const q = (document.getElementById('task-search-input')?.value || '').toLowerCase();
  const list = allTasks.filter(t => {
    if (filterCat !== 'all' && t.cat !== filterCat) return false;
    if (filterStatus !== 'all' && !t.status.includes(filterStatus)) return false;
    if (q && !t.title.toLowerCase().includes(q)) return false;
    return true;
  });

  const done = allTasks.filter(t => t.status.includes('完了')).length;
  const total = allTasks.length;
  document.getElementById('t-rate').textContent = total ? Math.round(done/total*100) : 0;
  document.getElementById('t-active').textContent = allTasks.filter(t => !t.status.includes('完了')).length;

  const el = document.getElementById('task-list');
  if (!list.length) { el.innerHTML = '<div class="loader" style="padding-top:40px">📋<br><br>タスクはありません</div>'; return; }

  el.innerHTML = list.map(t => {
    const isDone = t.status.includes('完了');
    const priColor = t.pri === '高' ? '#ffb4ab' : t.pri === '中' ? '#ffb691' : '#8b909f';
    const borderColor = t.pri === '高' ? '#93000a' : t.pri === '中' ? '#c55500' : '#414754';
    const statusLabel = t.status.replace(' 🙌','');
    return `
    <div class="swipe-card" data-id="${t.id}">
      <div class="swipe-action swipe-action-delete">
        <span class="material-symbols-outlined fill-icon" style="color:#fff;font-size:20px">delete</span>
        <span style="color:#fff">削除</span>
      </div>
      <div class="swipe-action swipe-action-complete">
        <span class="material-symbols-outlined fill-icon" style="color:#fff;font-size:20px">check_circle</span>
        <span style="color:#fff">完了</span>
      </div>
      <div class="swipe-inner" style="border-left: 3px solid ${borderColor}; ${isDone ? 'opacity:.5' : ''}">
        <div class="flex justify-between items-start">
          <span class="text-[13px] font-bold ${isDone ? 'line-through text-[#8b909f]' : 'text-[#dae2fd]'} flex-1 mr-2" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span>
          <button onclick="event.stopPropagation();openTaskDetail('${t.id}')" class="flex-shrink-0">
            <span class="material-symbols-outlined text-[#8b909f]" style="font-size:16px">open_in_new</span>
          </button>
        </div>
        <div class="flex gap-1.5 flex-wrap">
          ${t.cat ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded" style="${catStyle(t.cat)}">${t.cat}</span>` : ''}
          ${t.status ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded bg-[#2e4673]/40 text-[#9eb5e8]">${statusLabel}</span>` : ''}
          ${t.pri ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded" style="color:${priColor};background:${priColor}22">${t.pri}</span>` : ''}
          ${t.due ? `<span class="text-[10px] text-[#8b909f] px-1.5 py-0.5 rounded bg-[#2d3449]/50">📅 ${t.due}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  initSwipe();
}

function catStyle(cat) {
  if (cat === '仕事') return 'background:#1a73e822;color:#ADC7FF';
  if (cat === '個人') return 'background:#10B98122;color:#10B981';
  if (cat === '転職') return 'background:#7B3F9E22;color:#d4a4ff';
  return 'background:#2d3449;color:#8b909f';
}

// ── SWIPE ──
function initSwipe() {
  document.querySelectorAll('.swipe-card').forEach(card => {
    let sx = 0, dragging = false, threshold = 60;
    card.addEventListener('touchstart', e => { sx = e.touches[0].clientX; dragging = true; }, { passive: true });
    card.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dx = e.touches[0].clientX - sx;
      card.classList.remove('swiped-left','swiped-right');
      if (dx < -30) card.classList.add('swiped-left');
      else if (dx > 30) card.classList.add('swiped-right');
    }, { passive: true });
    card.addEventListener('touchend', e => {
      if (!dragging) return; dragging = false;
      const dx = e.changedTouches[0].clientX - sx;
      if (dx < -threshold) { const id = card.dataset.id; setTimeout(() => { markComplete(id); }, 400); }
      else if (dx > threshold) { const id = card.dataset.id; setTimeout(() => { deleteTask(id); }, 400); }
      else { card.classList.remove('swiped-left','swiped-right'); }
    });
  });
}

// ── TASK ACTIONS ──
async function markComplete(id) {
  const t = allTasks.find(x => x.id === id);
  if (!t) return;
  const next = t.status.includes('完了') ? '未着手' : '完了 🙌';
  await notionPatch(id, { 'ステータス': { select: { name: next } } });
  t.status = next;
  renderTasks(); updateHome();
}

async function deleteTask(id) {
  await notionPatch(id, {}); // archive via API
  try {
    await fetch(`${PROXY}/v1/pages/${id}`, {
      method: 'PATCH',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
      body: JSON.stringify({ archived: true })
    });
  } catch(e) {}
  allTasks = allTasks.filter(x => x.id !== id);
  renderTasks(); updateHome();
}

function openTaskDetail(id) {
  const t = allTasks.find(x => x.id === id);
  if (!t) return;
  currentTaskId = id;
  const statusLabel = t.status.replace(' 🙌','');
  document.getElementById('detail-content').innerHTML = `
    <div class="font-['Plus_Jakarta_Sans'] text-[18px] font-bold text-[#dae2fd] mb-3">${t.title}</div>
    <div class="flex gap-2 flex-wrap mb-4">
      ${t.cat ? `<span class="text-[11px] font-bold px-2 py-1 rounded-full" style="${catStyle(t.cat)}">${t.cat}</span>` : ''}
      <span class="text-[11px] font-bold px-2 py-1 rounded-full bg-[#2e4673]/40 text-[#9eb5e8]">${statusLabel}</span>
      ${t.pri ? `<span class="text-[11px] font-bold px-2 py-1 rounded-full bg-[#222a3d] text-[#c1c6d6]">${t.pri}</span>` : ''}
    </div>
    ${t.due ? `<div class="flex items-center gap-2 py-3 border-t border-[#414754]/30"><span class="text-[11px] text-[#8b909f] w-16">期限</span><span class="text-[13px]">${t.due}</span></div>` : ''}
    <div class="flex items-center gap-2 py-3 border-t border-[#414754]/30"><span class="text-[11px] text-[#8b909f] w-16">ステータス</span><span class="text-[13px]">${t.status}</span></div>
    <div class="flex items-center gap-2 py-3 border-t border-[#414754]/30"><span class="text-[11px] text-[#8b909f] w-16">優先度</span><span class="text-[13px]">${t.pri || '-'}</span></div>
  `;
  document.getElementById('detail-modal').classList.add('open');
}

async function cycleStatus() {
  if (!currentTaskId) return;
  const t = allTasks.find(x => x.id === currentTaskId);
  if (!t) return;
  const cycle = ['未着手', '対応中', '完了 🙌'];
  const idx = cycle.findIndex(s => t.status.includes(s.replace(' 🙌','')));
  const next = cycle[(idx + 1) % cycle.length];
  await notionPatch(currentTaskId, { 'ステータス': { select: { name: next } } });
  t.status = next;
  renderTasks(); updateHome();
  closeModal('detail-modal');
}

async function addTask() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) return;
  const cat = document.getElementById('new-cat').value;
  const pri = document.getElementById('new-pri').value;
  const due = document.getElementById('new-due').value;
  const props = {
    'Name': { title: [{ text: { content: title } }] },
    'カテゴリ': { select: { name: cat } },
    '優先度': { select: { name: pri } },
    'ステータス': { select: { name: '未着手' } }
  };
  if (due) props['期限'] = { date: { start: due } };
  await notionPost('/pages', { parent: { database_id: DB_TASKS }, properties: props });
  document.getElementById('new-title').value = '';
  closeModal('add-modal');
  await loadTasks();
}

// ── RENDER SCHEDULE ──
function renderSchedule() {
  const today = new Date().toISOString().split('T')[0];
  const upcoming = allSched.filter(s => s.date >= today && s.status !== 'キャンセル').slice(0, 10);
  document.getElementById('s-count').textContent = upcoming.length;

  // calc next schedule minutes
  const now = new Date();
  let minDiff = '-';
  for (const s of upcoming) {
    if (s.date === today) { minDiff = '—'; break; }
  }
  document.getElementById('s-next').textContent = minDiff;

  const el = document.getElementById('schedule-list');
  if (!upcoming.length) { el.innerHTML = '<div class="loader" style="padding-top:40px">📅<br><br>予定はありません</div>'; return; }

  const catColors = { '仕事': '#ADC7FF', '転職': '#d4a4ff', '個人': '#10B981' };
  const catBg = { '仕事': '#1a73e822', '転職': '#7B3F9E22', '個人': '#10B98122' };
  const borderColors = ['#ADC7FF', '#afc7fb', '#ffb691', '#10B981', '#8b909f'];

  el.innerHTML = upcoming.map((s, i) => {
    const d = s.date ? new Date(s.date + 'T00:00:00') : null;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateLabel = d ? `${months[d.getMonth()]} ${d.getDate()}` : '';
    const bc = borderColors[i % borderColors.length];
    const cc = catColors[s.cat] || '#8b909f';
    const cbg = catBg[s.cat] || '#2d344922';
    return `
    <div class="flex items-center gap-3 bg-[#131b2e] px-3 py-3 rounded-lg hover:bg-[#222a3d] transition-colors">
      <div class="w-14 flex-shrink-0">
        <span class="text-[11px] font-bold font-mono" style="color:${bc}">${dateLabel}</span>
      </div>
      <div class="w-1 h-8 rounded-full flex-shrink-0" style="background:${bc}"></div>
      <div class="flex-1 min-w-0">
        <div class="text-[13px] font-bold text-[#dae2fd] truncate">${s.title}</div>
        ${s.memo ? `<div class="text-[10px] text-[#8b909f] truncate">${s.memo}</div>` : ''}
      </div>
      ${s.cat ? `<span class="flex-shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-full" style="color:${cc};background:${cbg}">${s.cat}</span>` : ''}
    </div>`;
  }).join('');
}

// ── RENDER KNOWLEDGE ──

function filterKnowledge(q) { renderKnowledge(q); }

// ── HOME ──
function updateHome() {
  const pending = allTasks.filter(t => !t.status.includes('完了')).length;
  const done = allTasks.filter(t => t.status.includes('完了')).length;
  const today = new Date().toISOString().split('T')[0];
  const todayCount = allSched.filter(s => s.date === today).length;
  document.getElementById('h-pending').textContent = pending;
  document.getElementById('h-done').textContent = done;
  document.getElementById('h-today').textContent = todayCount;

  const highTasks = allTasks.filter(t => t.pri === '高' && !t.status.includes('完了')).slice(0, 5);
  const el = document.getElementById('home-high-tasks');
  el.innerHTML = highTasks.length ? highTasks.map(t => `
    <div class="bg-[#222a3d] p-2.5 flex items-center gap-3 rounded-md mb-1.5 active:bg-[#2d3449] transition-colors cursor-pointer" onclick="switchTab('tasks')">
      <div class="w-8 h-8 flex-shrink-0 bg-[#2e4673] flex items-center justify-center rounded">
        <span class="material-symbols-outlined text-[#9eb5e8]" style="font-size:16px">task_alt</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-[12px] font-bold text-[#dae2fd] truncate">${t.title}</p>
        <p class="text-[10px] text-[#8b909f]">${t.cat} ${t.due ? '· 期限: '+t.due : ''}</p>
      </div>
      <span class="material-symbols-outlined text-[#ADC7FF]" style="font-size:18px">radio_button_unchecked</span>
    </div>`) .join('') : '<div class="text-[12px] text-[#8b909f] py-3 text-center">🎉 高優先度タスクはありません</div>';

  const upcoming = allSched.filter(s => s.date >= today).slice(0, 3);
  const el2 = document.getElementById('home-upcoming');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  el2.innerHTML = upcoming.length ? upcoming.map(s => {
    const d = s.date ? new Date(s.date + 'T00:00:00') : null;
    return `
    <div class="flex items-center gap-3 bg-[#131b2e] px-3 py-2.5 rounded-lg mb-1">
      ${d ? `<div class="w-10 text-center bg-[#1a73e822] rounded-md py-1 flex-shrink-0">
        <div class="text-[9px] text-[#ADC7FF] font-bold">${months[d.getMonth()]}</div>
        <div class="text-[16px] font-['Plus_Jakarta_Sans'] font-extrabold text-[#ADC7FF]">${d.getDate()}</div>
      </div>` : ''}
      <div class="flex-1 min-w-0">
        <div class="text-[12px] font-bold text-[#dae2fd] truncate">${s.title}</div>
        ${s.cat ? `<div class="text-[10px] text-[#8b909f]">${s.cat}</div>` : ''}
      </div>
    </div>`;
  }).join('') : '<div class="text-[12px] text-[#8b909f] py-3 text-center">📅 直近の予定はありません</div>';
}

// ── FILTERS ──
function setTaskFilter(type, val, el) {
  if (type === 'cat') {
    filterCat = val;
    document.querySelectorAll('.filter-chip:not([data-sg])').forEach(c => c.classList.remove('active'));
  } else {
    filterStatus = filterStatus === val ? 'all' : val;
    document.querySelectorAll('[data-sg="status"]').forEach(c => c.classList.remove('active'));
    if (filterStatus !== 'all') el.classList.add('active');
    renderTasks(); return;
  }
  el.classList.add('active');
  renderTasks();
}

// ── TAB ──
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  const titles = { home: 'ホーム', tasks: 'タスク', schedule: '予定', knowledge: '知識' };
  document.getElementById('page-title').textContent = name === 'home' ? 'BRIDGE' : titles[name];

  // update nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.remove('active');
    b.style.color = '#C1C6D6';
    b.querySelectorAll('span').forEach(s => s.style.color = '#C1C6D6');
  });
  const nb = document.getElementById('nav-' + name);
  if (nb) {
    nb.style.color = '#ADC7FF';
    nb.querySelectorAll('span').forEach(s => s.style.color = '#ADC7FF');
  }

  // search button in header for tasks
  const sb = document.getElementById('header-search-btn');
  if (name === 'tasks') { sb.style.display = 'flex'; } else { sb.style.display = 'none'; }
}

function toggleSearch() {
  const bar = document.getElementById('task-search-bar');
  bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
  if (bar.style.display !== 'none') document.getElementById('task-search-input')?.focus();
}

// ── MODALS ──
function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
